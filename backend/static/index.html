<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CloudHub HR Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.sb{background:#1e3a5f}
.na{background:#2563eb!important;color:#fff!important}
.bdg{padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;display:inline-block}
.bdg-pending{background:#fef3c7;color:#92400e}
.bdg-approved{background:#d1fae5;color:#065f46}
.bdg-rejected{background:#fee2e2;color:#991b1b}
.bdg-active{background:#dbeafe;color:#1e40af}
.bdg-terminated{background:#f3f4f6;color:#6b7280}
.bdg-resigned{background:#fef9c3;color:#854d0e}
.crd{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #f1f5f9;padding:20px}
.inp{width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:13px;outline:none;box-sizing:border-box;color:#374151}
.inp:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.bp{background:#1e3a5f;color:#fff}.bp:hover{background:#152d4a}
.bs{background:#059669;color:#fff}.bs:hover{background:#047857}
.bd{background:#dc2626;color:#fff}.bd:hover{background:#b91c1c}
.bn{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}.bn:hover{background:#e2e8f0}
.be{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}.be:hover{background:#dbeafe}
.tbl th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;background:#f8fafc;border-bottom:1px solid #e2e8f0}
.tbl td{padding:11px 14px;font-size:13px;border-bottom:1px solid #f1f5f9;color:#374151}
.tbl tr:hover td{background:#fafafa}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.mbox{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto}
.ok{background:#d1fae5;border:1px solid #a7f3d0;color:#065f46;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:10px}
.er{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:10px}
.lbl{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sc{display:flex;align-items:center;gap:14px;background:#fff;border-radius:12px;padding:16px;border:1px solid #e2e8f0}
.si{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
textarea.inp{resize:vertical}
</style>
</head>
<body style="background:#f8fafc;font-family:system-ui,-apple-system,sans-serif;margin:0">

<div id="pg_login" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%)">
  <div style="background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.25)">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:32px">
      <div style="width:48px;height:48px;background:#1e3a5f;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
      </div>
      <div>
        <h1 style="font-size:20px;font-weight:700;color:#1e293b;margin:0">CloudHub HR</h1>
        <p style="font-size:13px;color:#94a3b8;margin:2px 0 0">HR Management Portal</p>
      </div>
    </div>
    <div id="loginErr"></div>
    <div style="margin-bottom:14px"><label class="lbl">Email Address</label><input id="lEmail" type="email" class="inp" placeholder="Enter your email" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div style="margin-bottom:22px"><label class="lbl">Password</label><input id="lPass" type="password" class="inp" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button onclick="doLogin()" class="btn bp" style="width:100%;justify-content:center;padding:12px;font-size:15px">Sign In</button>
    <p style="text-align:center;font-size:12px;color:#94a3b8;margin:18px 0 0">Contact your HR administrator for login credentials</p>
  </div>
</div>

<div id="pg_app" style="display:none;height:100vh;overflow:hidden">
  <div style="display:flex;height:100%">
    <aside class="sb" style="width:224px;flex-shrink:0;display:flex;flex-direction:column;height:100%;overflow:hidden">
      <div style="padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.1)">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:34px;height:34px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16"/></svg>
          </div>
          <div>
            <div style="font-weight:700;color:#fff;font-size:13px">CloudHub HR</div>
            <div id="roleLabel" style="font-size:11px;color:#93c5fd;text-transform:capitalize"></div>
          </div>
        </div>
      </div>
      <nav id="nav" style="flex:1;padding:8px;overflow-y:auto"></nav>
      <div style="padding:8px;border-top:1px solid rgba(255,255,255,.1)">
        <div id="userEmail" style="padding:6px 10px;margin-bottom:2px;font-size:11px;color:#7fb3e8;word-break:break-all"></div>
        <button onclick="logout()" style="display:flex;align-items:center;gap:8px;color:#93c5fd;font-size:13px;padding:8px 10px;border-radius:8px;cursor:pointer;background:none;border:none;width:100%;text-align:left" onmouseover="this.style.background='rgba(255,255,255,.08)'" onmouseout="this.style.background='none'">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Sign Out
        </button>
      </div>
    </aside>
    <main style="flex:1;overflow:auto;background:#f8fafc">
      <div style="padding:26px;max-width:1200px;margin:0 auto" id="content"><p style="color:#94a3b8">Loading...</p></div>
    </main>
  </div>
</div>

<div id="modal" class="mbg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="mbox" id="mbox"></div>
</div>

<script>
var tok='',role='',myEmpId=0;
function G(id){return document.getElementById(id);}

function api(path,method,body){
  var opts={method:method||'GET',headers:{'Content-Type':'application/json'}};
  if(tok) opts.headers['Authorization']='Bearer '+tok;
  if(body) opts.body=JSON.stringify(body);
  return fetch(path,opts).then(function(r){
    if(!r.ok) return r.json().then(function(e){throw e;});
    return r.json();
  });
}

function showAlert(id,msg,type){
  var el=G(id); if(!el) return;
  el.innerHTML='<div class="'+(type==='s'?'ok':'er')+'">'+msg+'</div>';
  if(type==='s') setTimeout(function(){if(el) el.innerHTML='';},3500);
}

function showModal(html){G('mbox').innerHTML=html;G('modal').style.display='flex';}
function closeModal(){G('modal').style.display='none';}

function doLogin(){
  var email=G('lEmail').value, pass=G('lPass').value;
  if(!email||!pass){showAlert('loginErr','Please enter email and password');return;}
  api('/auth/login','POST',{email:email,password:pass}).then(function(d){
    tok=d.access_token; role=d.role;
    G('pg_login').style.display='none';
    G('pg_app').style.display='flex';
    G('roleLabel').textContent=role+' Portal';
    G('userEmail').textContent=email;
    buildNav();
    if(role==='employee') showEmpDash(); else showAdminDash();
  }).catch(function(e){showAlert('loginErr',e.detail||'Invalid email or password');});
}

function logout(){
  tok=''; role=''; myEmpId=0;
  G('pg_app').style.display='none';
  G('pg_login').style.display='flex';
  G('lEmail').value=''; G('lPass').value='';
}

function navBtn(label,fn){
  return '<button onclick="'+fn+'()" id="nb_'+fn+'" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:13px;color:#93c5fd;cursor:pointer;background:none;border:none;width:100%;text-align:left;margin-bottom:2px" onmouseover="if(!this.classList.contains(\'na\'))this.style.background=\'rgba(255,255,255,.08)\'" onmouseout="if(!this.classList.contains(\'na\'))this.style.background=\'none\'">'+label+'</button>';
}

function setActive(fn){
  document.querySelectorAll('#nav button').forEach(function(b){b.classList.remove('na');b.style.background='none';b.style.color='#93c5fd';});
  var el=G('nb_'+fn);
  if(el){el.classList.add('na');el.style.background='#2563eb';el.style.color='#fff';}
}

function buildNav(){
  var isA=role==='admin', isM=role==='manager';
  var items=(isA||isM)?[
    ['Dashboard','showAdminDash'],
    ['Employees','showEmployees'],
    isA?['Onboarding','showOnboard']:null,
    isA?['Deleted Employees','showDeletedEmps']:null,
    isA?['Create Admin','showCreateAdmin']:null,
    ['Timesheets','showTimesheets'],
    ['Leave Requests','showLeaveReqs'],
    ['Payroll','showPayroll'],
    ['Holidays & Leaves','showHolidaysLeaves'],
    ['Documents','showDocs'],
    isA?['Resignations','showResignations']:null
  ]:[
    ['My Dashboard','showEmpDash'],
    ['My Timesheets','showMyTimesheets'],
    ['Apply Leave','showApplyLeave'],
    ['Leave Balance','showLeaveBalance'],
    ['My Payslips','showPayslips'],
    ['Holidays','showHolidaysLeaves'],
    ['Documents','showDocs'],
    ['My Profile','showProfile'],
    ['Resign','showResign']
  ];
  var icons={'showAdminDash':'🏠','showEmployees':'👥','showOnboard':'➕','showDeletedEmps':'🗄️','showCreateAdmin':'🔐','showTimesheets':'🕐','showLeaveReqs':'🌴','showPayroll':'💰','showHolidaysLeaves':'📅','showDocs':'📄','showResignations':'📋','showEmpDash':'🏠','showMyTimesheets':'🕐','showApplyLeave':'🌴','showLeaveBalance':'📊','showPayslips':'💰','showProfile':'👤','showResign':'🚪'};
  G('nav').innerHTML=items.filter(Boolean).map(function(i){return navBtn(icons[i[1]]||'•'+' '+i[0],i[1]);}).join('');
}

function setPage(html){G('content').innerHTML=html;}
function H1(t){return '<h1 style="font-size:22px;font-weight:700;color:#1e293b;margin:0 0 20px">'+t+'</h1>';}

function fld(id,lbl,type,req,val){
  type=type||'text'; val=val!==undefined?String(val):'';
  var safeVal=val.replace(/"/g,'&quot;').replace(/</g,'&lt;');
  return '<div><label class="lbl">'+lbl+(req?' *':'')+'</label><input id="'+id+'" type="'+type+'" class="inp"'+(req?' required':'')+(type==='date'||type==='number'?' value="'+safeVal+'"':' value="'+safeVal+'"')+'></div>';
}

function scard(lbl,val,col,ic){
  return '<div class="sc"><div class="si" style="background:'+col+'20">'+ic+'</div><div><div style="font-size:26px;font-weight:700;color:#1e293b">'+val+'</div><div style="font-size:12px;color:#64748b;margin-top:2px">'+lbl+'</div></div></div>';
}

function tbl(heads,rows,emptyMsg){
  return '<div class="crd" style="padding:0;overflow:hidden"><table class="tbl" style="width:100%"><thead><tr>'+
    heads.map(function(h){return '<th>'+h+'</th>';}).join('')+
    '</tr></thead><tbody>'+
    (rows||'<tr><td colspan="'+heads.length+'" style="text-align:center;color:#94a3b8;padding:40px">'+(emptyMsg||'No data')+'</td></tr>')+
    '</tbody></table></div>';
}

/* ──────────────────────────── ADMIN DASHBOARD ───────────────────────────── */
function showAdminDash(){
  setActive('showAdminDash');
  setPage(H1(role==='manager'?'Manager Dashboard':'Admin Dashboard')+'<p style="color:#94a3b8">Loading...</p>');
  Promise.all([api('/dashboard/stats'),api('/leaves/all').catch(function(){return[];})]).then(function(res){
    var s=res[0],lv=Array.isArray(res[1])?res[1]:[];
    var pl=lv.filter(function(l){return l.status==='pending';}).length;
    setPage(H1(role==='manager'?'Manager Dashboard':'Admin Dashboard')+
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px">'+
      scard('Total Employees',s.total_employees,'#2563eb','👥')+
      scard('Pending Timesheets',s.pending_timesheets,'#f59e0b','⏳')+
      scard('Approved Timesheets',s.approved_timesheets,'#10b981','✅')+
      scard('Pending Leaves',pl,'#8b5cf6','🌴')+'</div>'+
      (s.upcoming_holidays&&s.upcoming_holidays.length?
        '<div class="crd"><h3 style="font-size:14px;font-weight:600;margin:0 0 12px">📅 Upcoming Holidays</h3>'+
        s.upcoming_holidays.map(function(h){return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:13px"><span style="font-weight:500">'+h.name+'</span><span style="color:#64748b">'+h.date+'</span></div>';}).join('')+'</div>':'')
    );
  }).catch(function(){setPage(H1('Dashboard')+'<p style="color:#ef4444">Failed to load</p>');});
}

/* ──────────────────────────── EMPLOYEES ─────────────────────────────────── */
function showEmployees(){
  setActive('showEmployees');
  setPage(H1('Employees')+'<p style="color:#94a3b8">Loading...</p>');
  api('/employees/').then(function(emps){
    var rows=emps.length?emps.map(function(e){
      return '<tr>'+
        '<td><div style="font-weight:500">'+e.first_name+' '+e.last_name+'</div><div style="font-size:12px;color:#94a3b8">'+e.email+'</div></td>'+
        '<td style="font-family:monospace;font-size:12px;color:#2563eb">'+e.employee_id+'</td>'+
        '<td>'+(e.designation||'-')+'</td>'+
        '<td>'+(e.department||'-')+'</td>'+
        '<td><span class="bdg bdg-'+(e.status||'active')+'">'+(e.status||'active')+'</span></td>'+
        '<td style="white-space:nowrap">'+
          '<button onclick="openEditModal('+e.id+')" class="btn be" style="padding:3px 8px;font-size:11px;margin-right:3px">Edit</button>'+
          '<button onclick="openAssignMgrModal('+e.id+')" class="btn bn" style="padding:3px 8px;font-size:11px;margin-right:3px">Assign Mgr</button>'+
          '<button onclick="openTermModal('+e.id+',\''+e.first_name+' '+e.last_name+'\')" class="btn bd" style="padding:3px 8px;font-size:11px;margin-right:3px">Terminate</button>'+
          (role==='admin'?'<button onclick="doDeleteEmp('+e.id+',\''+e.first_name+' '+e.last_name+'\')" class="btn bn" style="padding:3px 8px;font-size:11px;color:#dc2626">Delete</button>':'')+
        '</td></tr>';
    }).join(''):null;
    setPage(H1('Employees ('+emps.length+')')+tbl(['Employee','ID','Designation','Department','Status','Actions'],rows,'No employees found'));
  }).catch(function(){setPage(H1('Employees')+'<p style="color:#ef4444">Failed to load</p>');});
}

function openEditModal(id){
  api('/employees/'+id).then(function(e){
    showModal(
      '<h3 style="font-size:16px;font-weight:600;margin:0 0 16px">Edit Employee</h3>'+
      '<div id="editAlert"></div>'+
      '<div style="max-height:56vh;overflow-y:auto;padding-right:4px">'+
      '<div class="g2" style="margin-bottom:10px">'+
      fld('ed_fn','First Name','text',false,e.first_name||'')+
      fld('ed_ln','Last Name','text',false,e.last_name||'')+
      fld('ed_ph','Phone','text',false,e.phone||'')+
      fld('ed_des','Designation','text',false,e.designation||'')+
      fld('ed_dep','Department','text',false,e.department||'')+
      '<div><label class="lbl">Employment Type</label><select id="ed_et" class="inp">'+
        ['permanent','contractor','intern','consultant'].map(function(v){
          return '<option value="'+v+'"'+(e.employment_type===v?' selected':'')+'>'+v.charAt(0).toUpperCase()+v.slice(1)+'</option>';
        }).join('')+
      '</select></div>'+
      fld('ed_doj','Date of Joining','date',false,e.date_of_joining||'')+
      fld('ed_dob','Date of Birth','date',false,e.date_of_birth||'')+
      '</div>'+
      '<div style="margin-bottom:10px"><label class="lbl">Address</label><textarea id="ed_addr" class="inp" rows="2">'+( e.address||'')+'</textarea></div>'+
      '<div class="g2">'+
      fld('ed_ba','Bank Account','text',false,e.bank_account||'')+
      fld('ed_bn','Bank Name','text',false,e.bank_name||'')+
      fld('ed_ic','IFSC Code','text',false,e.ifsc_code||'')+
      fld('ed_pf','PF Number','text',false,e.pf_number||'')+
      fld('ed_uan','UAN Number','text',false,e.uan_number||'')+
      '</div></div>'+
      '<div style="display:flex;gap:8px;margin-top:16px">'+
      '<button onclick="saveEditEmp('+e.id+')" class="btn bp">Save Changes</button>'+
      '<button onclick="closeModal()" class="btn bn">Cancel</button></div>'
    );
  }).catch(function(err){alert('Could not load employee: '+(err.detail||'Error'));});
}

function saveEditEmp(id){
  var data={};
  var map=[['ed_fn','first_name'],['ed_ln','last_name'],['ed_ph','phone'],['ed_des','designation'],
           ['ed_dep','department'],['ed_et','employment_type'],['ed_doj','date_of_joining'],
           ['ed_dob','date_of_birth'],['ed_addr','address'],['ed_ba','bank_account'],
           ['ed_bn','bank_name'],['ed_ic','ifsc_code'],['ed_pf','pf_number'],['ed_uan','uan_number']];
  map.forEach(function(p){var el=G(p[0]);if(el&&el.value!=='') data[p[1]]=el.value;});
  api('/employees/'+id,'PUT',data).then(function(){
    showAlert('editAlert','Employee updated successfully!','s');
    setTimeout(function(){closeModal();showEmployees();},1200);
  }).catch(function(err){showAlert('editAlert',err.detail||'Failed to update');});
}

function openAssignMgrModal(empId){
  api('/employees/').then(function(emps){
    showModal(
      '<h3 style="font-size:16px;font-weight:600;margin:0 0 14px">Assign Manager</h3>'+
      '<select id="mgrSel" class="inp" style="margin-bottom:12px"><option value="">Select manager...</option>'+
      emps.filter(function(e){return e.id!==empId;}).map(function(e){
        return '<option value="'+e.id+'">'+e.first_name+' '+e.last_name+' ('+e.employee_id+')</option>';
      }).join('')+'</select>'+
      '<div id="mgrAlert"></div>'+
      '<div style="display:flex;gap:8px"><button onclick="confirmAssignMgr('+empId+')" class="btn bp">Assign</button><button onclick="closeModal()" class="btn bn">Cancel</button></div>'
    );
  });
}

function confirmAssignMgr(empId){
  var mid=G('mgrSel').value;
  if(!mid){showAlert('mgrAlert','Please select a manager');return;}
  api('/employees/'+empId+'/assign-manager','POST',{manager_employee_id:parseInt(mid)}).then(function(r){
    showAlert('mgrAlert',r.message,'s');
    setTimeout(function(){closeModal();},1000);
  }).catch(function(err){showAlert('mgrAlert',err.detail||'Failed');});
}

function openTermModal(id,name){
  var today=new Date().toISOString().split('T')[0];
  showModal(
    '<h3 style="font-size:16px;font-weight:600;margin:0 0 14px">Terminate: '+name+'</h3>'+
    '<div style="display:grid;gap:12px">'+
    '<div><label class="lbl">Reason *</label><textarea id="tReason" class="inp" rows="3" placeholder="Enter reason..."></textarea></div>'+
    fld('tDate','Termination Date','date',true,today)+
    '</div><div id="termAlert" style="margin-top:10px"></div>'+
    '<div style="display:flex;gap:8px;margin-top:14px">'+
    '<button onclick="confirmTerminate('+id+')" class="btn bd">Confirm Terminate</button>'+
    '<button onclick="closeModal()" class="btn bn">Cancel</button></div>'
  );
}

function confirmTerminate(id){
  var reason=G('tReason').value,date=G('tDate').value;
  if(!reason||!date){showAlert('termAlert','Please fill all fields');return;}
  api('/employees/'+id+'/terminate','POST',{reason:reason,termination_date:date}).then(function(r){
    showAlert('termAlert',r.message,'s');
    setTimeout(function(){closeModal();showEmployees();},1000);
  }).catch(function(err){showAlert('termAlert',err.detail||'Failed');});
}

function doDeleteEmp(id,name){
  showModal(
    '<h3 style="font-size:16px;font-weight:600;margin:0 0 12px">Delete Employee</h3>'+
    '<p style="font-size:13px;color:#475569;margin:0 0 6px">Delete <strong>'+name+'</strong>?</p>'+
    '<p style="font-size:12px;color:#64748b;margin:0 0 16px">They will appear in <strong>Deleted Employees</strong> and can be reinstated.</p>'+
    '<div id="delAlert"></div>'+
    '<div style="display:flex;gap:8px">'+
    '<button onclick="confirmDeleteEmp('+id+')" class="btn bd">Delete</button>'+
    '<button onclick="closeModal()" class="btn bn">Cancel</button></div>'
  );
}

function confirmDeleteEmp(id){
  api('/employees/'+id,'DELETE').then(function(r){
    showAlert('delAlert',r.message,'s');
    setTimeout(function(){closeModal();showEmployees();},1000);

function loadSalaryComp(empId){
  if(!empId) return;
  api('/payroll/components/'+empId).then(function(c){
    G('sc_basic').value=c.basic||0; G('sc_hra').value=c.hra||0;
    G('sc_allow').value=c.allowances||0; G('sc_bonus').value=c.bonus||0;
    G('sc_pf').value=c.pf_deduction||0; G('sc_pt').value=c.professional_tax||0;
    G('sc_it').value=c.income_tax||0; G('sc_date').value=c.effective_from||'';
    showAlert('scAlert','Existing salary config loaded','s');
  }).catch(function(){
    ['sc_basic','sc_hra','sc_allow','sc_bonus','sc_pf','sc_pt','sc_it','sc_date'].forEach(function(id){if(G(id)) G(id).value='';});
  });
}

function saveSalaryComp(){
  var emp=G('scEmp').value;
  if(!emp){showAlert('scAlert','Please select an employee first');return;}
  var data={employee_id:parseInt(emp),basic:parseFloat(G('sc_basic').value)||0,hra:parseFloat(G('sc_hra').value)||0,allowances:parseFloat(G('sc_allow').value)||0,bonus:parseFloat(G('sc_bonus').value)||0,pf_deduction:parseFloat(G('sc_pf').value)||0,professional_tax:parseFloat(G('sc_pt').value)||0,income_tax:parseFloat(G('sc_it').value)||0};
  var d=G('sc_date').value; if(d) data.effective_from=d;
  api('/payroll/components','POST',data).then(function(){
    showAlert('scAlert','Salary configuration saved!','s');
  }).catch(function(err){showAlert('scAlert',err.detail||'Failed');});
}

function genPayslip(){
  var emp=G('pEmp').value;
  if(!emp){showAlert('payAlert','Please select an employee');return;}
  api('/payroll/generate','POST',{employee_id:parseInt(emp),month:parseInt(G('pMo').value),year:parseInt(G('pYr').value)}).then(function(){
    showAlert('payAlert','Payslip generated!','s'); setTimeout(showPayroll,1200);
  }).catch(function(err){showAlert('payAlert',err.detail||'Set salary components first');});
}

      '<div id="tsAlert"></div><div class="g2">'+
      fld('tsD','Date','date')+fld('tsH','Hours','number')+
      '<div style="grid-column:span 2"><label class="lbl">Task Description</label><textarea id="tsT" class="inp" rows="2" placeholder="What did you work on?"></textarea></div>'+
      fld('tsP','Project')+
      '<div style="display:flex;align-items:flex-end"><button onclick="submitTS()" class="btn bp">Submit</button></div>'+
      '</div></div>'+
      tbl(['Date','Hours','Task','Project','Status'],rows,'No timesheets yet')
    );
    G('tsD').value=today; G('tsH').value='8';
  }).catch(function(){setPage(H1('My Timesheets')+'<p style="color:#ef4444">Failed</p>');});
}

function submitTS(){
  var d={date:G('tsD').value,hours_worked:parseFloat(G('tsH').value)||8,task_description:G('tsT').value,project:G('tsP').value};
  api('/timesheets/submit','POST',d).then(function(){
    showAlert('tsAlert','Timesheet submitted!','s'); setTimeout(showMyTimesheets,1000);
  }).catch(function(err){showAlert('tsAlert',err.detail||'Failed');});
}

/* ──────────────────────────── APPLY LEAVE ───────────────────────────────── */
function showApplyLeave(){
  setActive('showApplyLeave');
  setPage(H1('Apply Leave')+
    '<div class="crd" style="max-width:540px"><div id="lvAlert"></div>'+
    '<form onsubmit="submitLeave(event)" style="display:grid;gap:14px">'+
    '<div><label class="lbl">Leave Type *</label><select id="lvType" class="inp" required><option value="">Select type...</option><option value="paid">Paid Leave (PL)</option><option value="sick">Sick Leave (SL)</option><option value="earned">Earned Leave (EL)</option><option value="sabbatical">Sabbatical Leave</option><option value="lop">Leave Without Pay (LOP)</option></select></div>'+
    '<div class="g2">'+fld('lvF','From Date','date',true)+fld('lvT','To Date','date',true)+'</div>'+
    '<div><label class="lbl">Reason</label><textarea id="lvR" class="inp" rows="3" placeholder="Reason for leave..."></textarea></div>'+
    '<button type="submit" class="btn bp" style="justify-content:center;padding:10px">Submit Leave Request</button>'+
    '</form></div>'
  );
}

function submitLeave(e){
  e.preventDefault();
  api('/leaves/request','POST',{leave_type:G('lvType').value,start_date:G('lvF').value,end_date:G('lvT').value,reason:G('lvR').value}).then(function(){
    showAlert('lvAlert','Leave request submitted!','s'); e.target.reset();
  }).catch(function(err){showAlert('lvAlert',err.detail||'Failed');});
}

/* ──────────────────────────── LEAVE BALANCE ─────────────────────────────── */
function showLeaveBalance(){
  setActive('showLeaveBalance');
  setPage(H1('Leave Balance')+'<p style="color:#94a3b8">Loading...</p>');
  Promise.all([api('/leaves/balances/my'),api('/leaves/my')]).then(function(res){
    var bal=res[0],hist=res[1];
    var balHtml=bal.length?
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px">'+
      bal.map(function(b){
        var pct=b.total_days>0?Math.round(b.remaining_days/b.total_days*100):0;
        return '<div class="crd" style="text-align:center;padding:14px"><div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">'+b.leave_type.toUpperCase()+'</div><div style="font-size:28px;font-weight:700;color:#1e3a5f">'+b.remaining_days+'</div><div style="font-size:11px;color:#94a3b8">of '+b.total_days+' days</div><div style="margin-top:8px;height:4px;background:#f1f5f9;border-radius:2px"><div style="height:4px;background:#2563eb;border-radius:2px;width:'+pct+'%"></div></div></div>';
      }).join('')+'</div>':
      '<div class="crd" style="text-align:center;padding:20px;color:#94a3b8;margin-bottom:16px">No balance data</div>';
    var rows=hist.length?hist.map(function(l){
      return '<tr><td><span class="bdg" style="background:#ede9fe;color:#5b21b6">'+l.leave_type.toUpperCase()+'</span></td><td>'+l.start_date+'</td><td>'+l.end_date+'</td><td style="font-weight:600">'+l.days+'d</td><td style="font-size:12px;color:#64748b;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(l.reason||'-')+'</td><td><span class="bdg bdg-'+l.status+'">'+l.status+'</span>'+(l.review_comment?'<div style="font-size:11px;color:#64748b;margin-top:2px">'+l.review_comment+'</div>':'')+'</td></tr>';
    }).join(''):null;
    setPage(H1('Leave Balance & History')+balHtml+tbl(['Type','From','To','Days','Reason','Status'],rows,'No leave requests yet'));
  }).catch(function(){setPage(H1('Leave Balance')+'<p style="color:#ef4444">Failed</p>');});
}

/* ──────────────────────────── PAYSLIPS (employee) ───────────────────────── */
function showPayslips(){
  setActive('showPayslips');
  setPage(H1('My Payslips')+'<p style="color:#94a3b8">Loading...</p>');
  api('/payroll/records').then(function(recs){
    setPage(H1('My Payslips')+(recs.length?
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px">'+
      recs.map(function(r){
        return '<div class="crd"><div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:14px"><span style="font-weight:600;color:#1e293b">'+
          new Date(r.year,r.month-1).toLocaleString('en',{month:'long',year:'numeric'})+
          '</span><a href="/payroll/slip/'+r.id+'" target="_blank" class="btn bn" style="padding:4px 10px;font-size:11px">PDF</a></div>'+
          [['Gross','&#8377;'+Number(r.gross_salary).toLocaleString('en-IN'),null],
           ['Deductions','-&#8377;'+Number(r.total_deductions).toLocaleString('en-IN'),'#dc2626'],
           ['Net Pay','&#8377;'+Number(r.net_salary).toLocaleString('en-IN'),'#059669']].map(function(kvc){
            return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9"><span style="color:#64748b">'+kvc[0]+'</span><span style="font-weight:'+(kvc[2]?'700':'400')+(kvc[2]?';color:'+kvc[2]:'')+'">'+kvc[1]+'</span></div>';
          }).join('')+'</div>';
      }).join('')+'</div>':
      '<div class="crd" style="text-align:center;padding:48px;color:#94a3b8">No payslips generated yet</div>'));
  }).catch(function(){setPage(H1('Payslips')+'<p style="color:#ef4444">Failed</p>');});
}

/* ──────────────────────────── PROFILE ───────────────────────────────────── */
function showProfile(){
  setActive('showProfile');
  setPage(H1('My Profile')+'<p style="color:#94a3b8">Loading...</p>');
  api('/employees/me').then(function(p){
    setPage(H1('My Profile')+
      '<div class="crd" style="max-width:640px">'+
      '<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid #f1f5f9">'+
      '<div style="width:64px;height:64px;background:#1e3a5f;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;flex-shrink:0">'+p.first_name[0]+p.last_name[0]+'</div>'+
      '<div><h2 style="font-size:18px;font-weight:700;color:#1e293b;margin:0">'+p.first_name+' '+p.last_name+'</h2>'+
      '<p style="color:#64748b;font-size:13px;margin:2px 0">'+(p.designation||'Employee')+' &middot; '+(p.department||'CloudHub')+'</p>'+
      '<p style="font-family:monospace;font-size:12px;color:#2563eb;margin:2px 0">'+p.employee_id+'</p></div></div>'+
      '<div class="g2">'+
      [['Email',p.email],['Phone',p.phone||'-'],['Designation',p.designation||'-'],['Department',p.department||'-'],['Type',p.employment_type],['Joined',p.date_of_joining||'-'],['Bank Name',p.bank_name||'-'],['Account',p.bank_account||'-'],['IFSC',p.ifsc_code||'-'],['PF Number',p.pf_number||'-']].map(function(kv){
        return '<div><div style="font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px">'+kv[0]+'</div><div style="font-size:13px;font-weight:500;color:#1e293b;margin-top:3px">'+kv[1]+'</div></div>';
      }).join('')+'</div></div>'
    );
  }).catch(function(){setPage(H1('Profile')+'<p style="color:#ef4444">Failed</p>');});
}

/* ──────────────────────────── RESIGN ────────────────────────────────────── */
function showResign(){
  setActive('showResign');
  var today=new Date().toISOString().split('T')[0];
  setPage(H1('Submit Resignation')+
    '<div class="crd" style="max-width:520px">'+
    '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#991b1b">Please discuss with your manager before submitting.</div>'+
    '<div id="resAlert"></div>'+
    '<form onsubmit="submitResign(event)" style="display:grid;gap:14px">'+
    fld('resDate','Notice Date','date',true,today)+
    fld('resLWD','Last Working Date','date')+
    '<div><label class="lbl">Reason</label><textarea id="resR" class="inp" rows="4" placeholder="State your reason..."></textarea></div>'+
    '<button type="submit" class="btn bd" style="justify-content:center;padding:10px">Submit Resignation</button>'+
    '</form></div>'
  );
}

function submitResign(e){
  e.preventDefault();
  var lwd=G('resLWD').value;
  api('/employees/me/resign','POST',{notice_date:G('resDate').value,last_working_date:lwd||null,reason:G('resR').value}).then(function(){
    showAlert('resAlert','Resignation submitted. HR will contact you.','s'); G('resR').value='';
  }).catch(function(err){showAlert('resAlert',err.detail||'Failed');});
}
</script>
