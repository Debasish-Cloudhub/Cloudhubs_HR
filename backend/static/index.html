<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CloudHub HR Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .sidebar{background:#1e3a5f}
  .nav-active{background:#2563eb!important;color:#fff!important}
  .badge{padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600}
  .badge-pending{background:#fef3c7;color:#92400e}
  .badge-approved{background:#d1fae5;color:#065f46}
  .badge-rejected{background:#fee2e2;color:#991b1b}
  .badge-active{background:#dbeafe;color:#1e40af}
  .badge-terminated{background:#f3f4f6;color:#6b7280}
  .card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #f1f5f9;padding:20px}
  .input{width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:14px;outline:none}
  .input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
  .btn-primary{background:#1e3a5f;color:#fff} .btn-primary:hover{background:#152d4a}
  .btn-success{background:#059669;color:#fff} .btn-success:hover{background:#047857}
  .btn-danger{background:#dc2626;color:#fff} .btn-danger:hover{background:#b91c1c}
  .btn-secondary{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0} .btn-secondary:hover{background:#e2e8f0}
  .tbl th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;background:#f8fafc;border-bottom:1px solid #e2e8f0}
  .tbl td{padding:12px 16px;font-size:13px;border-bottom:1px solid #f1f5f9}
  .tbl tr:hover td{background:#fafafa}
  .stat-card{background:#fff;border-radius:12px;padding:20px;border:1px solid #e2e8f0;display:flex;align-items:center;gap:16px}
  .stat-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center}
  .modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
  .alert-success{background:#d1fae5;border:1px solid #a7f3d0;color:#065f46;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
  .alert-error{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
</style>
</head>
<body style="background:#f8fafc;font-family:'Inter',system-ui,sans-serif">

<!-- LOGIN -->
<div id="loginPage" class="min-h-screen flex items-center justify-center p-4" style="background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%)">
  <div style="background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2)">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:32px">
      <div style="width:48px;height:48px;background:#1e3a5f;border-radius:12px;display:flex;align-items:center;justify-content:center">
        <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
      </div>
      <div><h1 style="font-size:20px;font-weight:700;color:#1e293b">CloudHub HR</h1><p style="font-size:13px;color:#94a3b8">HR Management Portal</p></div>
    </div>
    <div id="loginAlert"></div>
    <div style="margin-bottom:16px">
      <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px">Email Address</label>
      <input id="loginEmail" type="email" placeholder="Enter your email" class="input" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div style="margin-bottom:24px">
      <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px">Password</label>
      <input id="loginPassword" type="password" placeholder="Enter your password" class="input" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button onclick="doLogin()" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">Sign In</button>
    <p style="text-align:center;font-size:12px;color:#94a3b8;margin-top:20px">Contact your HR administrator for access credentials</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden" style="display:none;height:100vh;overflow:hidden">
  <div style="display:flex;height:100%">
    <!-- Sidebar -->
    <aside class="sidebar" style="width:220px;flex-shrink:0;display:flex;flex-direction:column;height:100%">
      <div style="padding:20px;border-bottom:1px solid rgba(255,255,255,.1)">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center">
            <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16"/></svg>
          </div>
          <div><div style="font-weight:700;color:#fff;font-size:14px">CloudHub HR</div><div id="roleLabel" style="font-size:11px;color:#93c5fd;text-transform:capitalize"></div></div>
        </div>
      </div>
      <nav id="sidebarNav" style="flex:1;padding:12px;overflow-y:auto"></nav>
      <div style="padding:12px;border-top:1px solid rgba(255,255,255,.1)">
        <div id="userInfo" style="padding:8px 12px;margin-bottom:4px;font-size:12px;color:#93c5fd;border-radius:8px;background:rgba(255,255,255,.05)"></div>
        <button onclick="logout()" style="display:flex;align-items:center;gap:8px;color:#93c5fd;font-size:13px;padding:8px 12px;border-radius:8px;cursor:pointer;background:none;border:none;width:100%;text-align:left" onmouseover="this.style.background='rgba(255,255,255,.08)'" onmouseout="this.style.background='none'">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Sign Out
        </button>
      </div>
    </aside>
    <!-- Content -->
    <main style="flex:1;overflow:auto;background:#f8fafc">
      <div style="padding:28px;max-width:1200px;margin:0 auto" id="pageContent"><p style="color:#94a3b8">Loading...</p></div>
    </main>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-bg hidden" style="display:none">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const API='';
let tok='',role='',uid='',empId='';

function api(path,method,body){
  const o={method:method||'GET',headers:{'Content-Type':'application/json'}};
  if(tok)o.headers['Authorization']='Bearer '+tok;
  if(body)o.body=JSON.stringify(body);
  return fetch(API+path,o).then(r=>{if(!r.ok)return r.json().then(e=>{throw e;});return r.json();});
}

function showAlert(id,msg,type='error'){
  const el=document.getElementById(id);
  if(!el)return;
  el.innerHTML='<div class="alert-'+(type==='success'?'success':'error')+'">'+msg+'</div>';
  if(type==='success')setTimeout(()=>{if(el)el.innerHTML='';},3000);
}

async function doLogin(){
  const email=document.getElementById('loginEmail').value;
  const pwd=document.getElementById('loginPassword').value;
  if(!email||!pwd){showAlert('loginAlert','Please enter email and password');return;}
  try{
    const d=await api('/auth/login','POST',{email,password:pwd});
    tok=d.access_token;role=d.role;uid=d.user_id;
    document.getElementById('loginPage').style.display='none';
    document.getElementById('mainApp').style.display='flex';
    document.getElementById('roleLabel').textContent=role+' Portal';
    document.getElementById('userInfo').textContent=email;
    setupNav();
    if(role==='admin'||role==='manager')showAdminDashboard();
    else showEmpDashboard();
  }catch(e){showAlert('loginAlert',e.detail||'Invalid credentials');}
}

function logout(){
  tok='';role='';uid='';empId='';
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginEmail').value='';
  document.getElementById('loginPassword').value='';
}

function showModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modal').style.display='flex';}
function hideModal(){document.getElementById('modal').style.display='none';}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)hideModal();});

function navItem(label,fn,icon=''){
  return `<button onclick="${fn}()" id="nav_${fn}" style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:13px;color:#93c5fd;cursor:pointer;background:none;border:none;width:100%;text-align:left;margin-bottom:2px" onmouseover="this.style.background='rgba(255,255,255,.08)'" onmouseout="if(!this.classList.contains('nav-active'))this.style.background='none'">${label}</button>`;
}

function setActive(fn){
  document.querySelectorAll('#sidebarNav button').forEach(b=>{b.classList.remove('nav-active');b.style.background='none';b.style.color='#93c5fd';});
  const el=document.getElementById('nav_'+fn);
  if(el){el.classList.add('nav-active');el.style.background='#2563eb';el.style.color='#fff';}
}

function setupNav(){
  const isAdmin=role==='admin';const isMgr=role==='manager';
  const adminNav=[['🏠 Dashboard','showAdminDashboard'],['👥 Employees','showEmployees'],['➕ Onboarding','showOnboarding'],['🕐 Timesheets','showTimesheets'],['💰 Payroll','showPayroll'],['📅 Holidays & Leaves','showHolidaysLeaves'],['📄 Documents','showDocuments'],['🔐 Create Admin','showCreateAdmin'],['📋 Resignations','showResignations']];
  const mgrNav=[['🏠 Dashboard','showAdminDashboard'],['👥 Employees','showEmployees'],['🕐 Timesheets','showTimesheets'],['🌴 Leave Requests','showLeaveRequests'],['📅 Holidays','showHolidaysLeaves']];
  const empNav=[['🏠 My Dashboard','showEmpDashboard'],['🕐 My Timesheets','showMyTimesheets'],['🌴 Apply Leave','showApplyLeave'],['📊 Leave Balance','showLeaveBalance'],['💰 My Payslips','showPayslips'],['📅 Holidays','showHolidaysLeaves'],['📄 Documents','showDocuments'],['👤 My Profile','showProfile'],['🚪 Resign','showResign']];
  const nav=isAdmin?adminNav:(isMgr?mgrNav:empNav);
  document.getElementById('sidebarNav').innerHTML=nav.map(([l,f])=>navItem(l,f)).join('');
}

function setPage(html){document.getElementById('pageContent').innerHTML=html;}
function h1(t){return `<h1 style="font-size:22px;font-weight:700;color:#1e293b;margin-bottom:20px">${t}</h1>`;}

// ── ADMIN DASHBOARD ──
async function showAdminDashboard(){
  setActive('showAdminDashboard');
  setPage(h1(role==='manager'?'Manager Dashboard':'Admin Dashboard')+'<p style="color:#94a3b8">Loading...</p>');
  try{
    const [stats,leaves]=await Promise.all([api('/dashboard/stats'),api('/leaves/all').catch(()=>([]))]);
    const pendingLeaves=Array.isArray(leaves)?leaves.filter(l=>l.status==='pending').length:0;
    setPage(h1(role==='manager'?'Manager Dashboard':'Admin Dashboard')+
      `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px">
        ${sc('Total Employees',stats.total_employees,'#2563eb','👥')}
        ${sc('Pending Timesheets',stats.pending_timesheets,'#f59e0b','🕐')}
        ${sc('Approved Timesheets',stats.approved_timesheets,'#10b981','✅')}
        ${sc('Pending Leaves',pendingLeaves,'#8b5cf6','🌴')}
      </div>`+
      (stats.upcoming_holidays?.length?'<div class="card"><h3 style="font-size:14px;font-weight:600;color:#374151;margin-bottom:12px">📅 Upcoming Holidays</h3>'+stats.upcoming_holidays.map(h=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px"><span style="font-weight:500">${h.name}</span><span style="color:#64748b">${h.date}</span></div>`).join('')+'</div>':'')
    );
  }catch(e){setPage(h1('Dashboard')+'<p style="color:#ef4444">Failed to load</p>');}
}

function sc(label,val,color,icon){
  return `<div class="stat-card"><div class="stat-icon" style="background:${color}20;font-size:22px">${icon}</div><div><div style="font-size:28px;font-weight:700;color:#1e293b">${val}</div><div style="font-size:13px;color:#64748b;margin-top:2px">${label}</div></div></div>`;
}

// ── EMPLOYEES ──
async function showEmployees(){
  setActive('showEmployees');
  setPage(h1('Employees')+'<p style="color:#94a3b8">Loading...</p>');
  try{
    const emps=await api('/employees/');
    setPage(h1('Employees ('+emps.length+')')+
      `<div class="card" style="padding:0;overflow:hidden">
        <table class="tbl" style="width:100%">
          <thead><tr><th>Employee</th><th>ID</th><th>Role</th><th>Department</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${emps.length?emps.map(e=>`<tr>
            <td><div style="font-weight:500;color:#1e293b">${e.first_name} ${e.last_name}</div><div style="font-size:12px;color:#94a3b8">${e.email}</div></td>
            <td style="font-family:monospace;font-size:12px;color:#2563eb">${e.employee_id}</td>
            <td>${e.designation||'-'}</td><td>${e.department||'-'}</td>
            <td><span class="badge badge-${e.status||'active'}">${e.status||'active'}</span></td>
            <td style="display:flex;gap:6px;flex-wrap:wrap">
              <button onclick="showAssignManager(${e.id})" class="btn btn-secondary" style="padding:4px 10px;font-size:12px">Assign Mgr</button>
              <button onclick="confirmTerminate(${e.id},'${e.first_name} ${e.last_name}')" class="btn btn-danger" style="padding:4px 10px;font-size:12px">Terminate</button>
              <button onclick="confirmDelete(${e.id},'${e.first_name} ${e.last_name}')" class="btn" style="padding:4px 10px;font-size:12px;background:#f1f5f9;color:#64748b">Delete</button>
            </td></tr>`).join(''):'<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:40px">No employees</td></tr>'}
          </tbody>
        </table>
      </div>`);
  }catch(e){setPage(h1('Employees')+'<p style="color:#ef4444">Failed to load</p>');}
}

function confirmDelete(id,name){
  showModal(`<h3 style="font-size:16px;font-weight:600;margin-bottom:12px">Delete Employee</h3>
    <p style="font-size:13px;color:#475569;margin-bottom:20px">Are you sure you want to delete <strong>${name}</strong>? This action cannot be undone.</p>
    <div style="display:flex;gap:8px">
      <button onclick="deleteEmp(${id})" class="btn btn-danger">Delete</button>
      <button onclick="hideModal()" class="btn btn-secondary">Cancel</button>
    </div>`);
}

async function deleteEmp(id){
  try{await api('/employees/'+id,'DELETE');hideModal();showEmployees();}
  catch(e){alert('Failed: '+(e.detail||e));}
}

function confirmTerminate(id,name){
  showModal(`<h3 style="font-size:16px;font-weight:600;margin-bottom:16px">Terminate Employee: ${name}</h3>
    <div style="margin-bottom:12px"><label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px">Reason *</label><textarea id="termReason" class="input" rows="3" placeholder="Enter termination reason..."></textarea></div>
    <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px">Termination Date *</label><input id="termDate" type="date" class="input" value="${new Date().toISOString().split('T')[0]}"/></div>
    <div id="termAlert"></div>
    <div style="display:flex;gap:8px">
      <button onclick="terminateEmp(${id})" class="btn btn-danger">Confirm Terminate</button>
      <button onclick="hideModal()" class="btn btn-secondary">Cancel</button>
    </div>`);
}

async function terminateEmp(id){
  const reason=document.getElementById('termReason').value;
  const date=document.getElementById('termDate').value;
  if(!reason||!date){showAlert('termAlert','Please fill all fields');return;}
  try{await api('/employees/'+id+'/terminate','POST',{reason,termination_date:date});hideModal();showEmployees();}
  catch(e){showAlert('termAlert','Failed: '+(e.detail||'Error'));}
}

function showAssignManager(empId){
  api('/employees/').then(emps=>{
    showModal(`<h3 style="font-size:16px;font-weight:600;margin-bottom:16px">Assign Manager</h3>
      <select id="mgrSelect" class="input" style="margin-bottom:16px">
        <option value="">Select Manager...</option>
        ${emps.filter(e=>e.id!==empId).map(e=>'<option value="'+e.id+'">'+e.first_name+' '+e.last_name+' ('+e.employee_id+')</option>').join('')}
      </select>
      <div id="mgrAlert"></div>
      <div style="display:flex;gap:8px">
        <button onclick="doAssignManager(${empId})" class="btn btn-primary">Assign</button>
        <button onclick="hideModal()" class="btn btn-secondary">Cancel</button>
      </div>`);
  });
}

async function doAssignManager(empId){
  const mid=document.getElementById('mgrSelect').value;
  if(!mid){showAlert('mgrAlert','Select a manager');return;}
  try{await api('/employees/'+empId+'/assign-manager','POST',{manager_employee_id:parseInt(mid)});hideModal();showEmployees();}
  catch(e){showAlert('mgrAlert','Failed: '+(e.detail||'Error'));}
}

// ── ONBOARDING ──
function showOnboarding(){
  setActive('showOnboarding');
  setPage(h1('Employee Onboarding')+`<div class="card" style="max-width:720px">
    <div id="onboardAlert"></div>
    <form onsubmit="submitOnboard(event)">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        ${f2('first_name','First Name','text',true)}${f2('last_name','Last Name','text',true)}
        ${f2('email','Email','email',true)}${f2('password','Password','password',true)}
        ${f2('phone','Phone')}${f2('designation','Designation')}
        ${f2('department','Department')}
        <div><label class="lbl">Employment Type</label><select id="f_employment_type" class="input"><option value="permanent">Permanent (CH-EMP)</option><option value="contractor">Contractor (CH-CON)</option><option value="intern">Intern (CH-INT)</option></select></div>
        ${f2('date_of_joining','Date of Joining','date')}
        ${f2('bank_account','Bank Account')}${f2('bank_name','Bank Name')}
        ${f2('ifsc_code','IFSC Code')}${f2('pf_number','PF Number')}${f2('uan_number','UAN Number')}
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top:20px">Create Employee</button>
    </form>
  </div>`);
}
function f2(id,label,type='text',req=false){return '<div><label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px">'+label+(req?' *':'')+'</label><input id="f_'+id+'" type="'+type+'" class="input"'+(req?' required':'')+'></div>';}

async function submitOnboard(e){
  e.preventDefault();
  const fields=['first_name','last_name','email','password','phone','designation','department','employment_type','date_of_joining','bank_account','bank_name','ifsc_code','pf_number','uan_number'];
  const data={};fields.forEach(f=>{const v=document.getElementById('f_'+f)?.value;if(v)data[f]=v;});
  try{const r=await api('/employees/','POST',data);showAlert('onboardAlert','✅ Employee created! ID: '+r.employee_id,'success');e.target.reset();}
  catch(err){showAlert('onboardAlert','❌ '+(err.detail||'Failed'));}
}

// ── CREATE ADMIN ──
function showCreateAdmin(){
  setActive('showCreateAdmin');
  setPage(h1('Create Admin User')+`<div class="card" style="max-width:480px">
    <div id="adminCreateAlert"></div>
    <form onsubmit="submitCreateAdmin(event)">
      <div style="display:grid;gap:16px">
        ${f2('ca_first','First Name','text',true)}${f2('ca_last','Last Name','text',true)}
        ${f2('ca_email','Email','email',true)}${f2('ca_pass','Password','password',true)}
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top:20px">Create Admin</button>
    </form>
  </div>`);
}
async function submitCreateAdmin(e){
  e.preventDefault();
  const data={first_name:document.getElementById('ca_first').value,last_name:document.getElementById('ca_last').value,email:document.getElementById('ca_email').value,password:document.getElementById('ca_pass').value};
  try{await api('/employees/admin/create','POST',data);showAlert('adminCreateAlert','✅ Admin created successfully','success');e.target.reset();}
  catch(err){showAlert('adminCreateAlert','❌ '+(err.detail||'Failed'));}
}

// ── TIMESHEETS ──
async function showTimesheets(){
  setActive('showTimesheets');
  setPage(h1('Timesheets')+'<p style="color:#94a3b8">Loading...</p>');
  try{
    const ts=await api('/timesheets/');
    setPage(h1('Timesheets')+`<div class="card" style="padding:0;overflow:hidden">
      <table class="tbl" style="width:100%"><thead><tr><th>Emp ID</th><th>Date</th><th>Hours</th><th>Task</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${ts.length?ts.map(t=>`<tr>
        <td style="font-size:12px;font-family:monospace;color:#2563eb">${t.employee_id}</td>
        <td>${t.date}</td><td>${t.hours_worked}h</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.task_description||'-'}</td>
        <td><span class="badge badge-${t.status}">${t.status}</span></td>
        <td>${t.status==='pending'?`<button onclick="approveTSItem(${t.id},'approved')" class="btn btn-success" style="padding:3px 10px;font-size:12px">Approve</button> <button onclick="approveTSItem(${t.id},'rejected')" class="btn btn-danger" style="padding:3px 10px;font-size:12px">Reject</button>`:'-'}</td>
      </tr>`).join(''):'<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:32px">No timesheets</td></tr>'}
      </tbody></table>
    </div>`);
  }catch(e){setPage(h1('Timesheets')+'<p style="color:#ef4444">Failed</p>');}
}
async function approveTSItem(id,status){
  try{await api('/timesheets/'+id+'/approve','PUT',{status});showTimesheets();}

  catch(err){showAlert('payAlert','❌ '+(err.detail||'Failed. Set salary components first.'));}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        ${[['Email',p.email],['Phone',p.phone||'-'],['Designation',p.designation||'-'],['Department',p.department||'-'],['Type',p.employment_type],['Joined',p.date_of_joining||'-'],['Bank',p.bank_name||'-'],['Account',p.bank_account||'-'],['PF',p.pf_number||'-'],['UAN',p.uan_number||'-']].map(([k,v])=>'<div><div style="font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px">'+k+'</div><div style="font-size:13px;font-weight:500;color:#1e293b;margin-top:3px">'+v+'</div></div>').join('')}
      </div>
    </div>`);
  }catch(e){setPage(h1('Profile')+'<p style="color:#ef4444">Failed</p>');}
}

// ── RESIGN ──
function showResign(){
  setActive('showResign');
  setPage(h1('Apply Resignation')+`<div class="card" style="max-width:520px">
    <p style="color:#64748b;font-size:13px;margin-bottom:20px">Please submit your resignation request below. Your manager and HR admin will be notified.</p>
    <div id="resignAlert"></div>
    <form onsubmit="submitResign(event)">
      <div style="display:grid;gap:14px">
        <div><label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px;color:#374151">Notice Date *</label><input id="resignDate" type="date" class="input" value="${new Date().toISOString().split('T')[0]}" required/></div>
        <div><label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px;color:#374151">Last Working Date</label><input id="resignLWD" type="date" class="input"/></div>
        <div><label style="font-size:13px;font-weight:500;display:block;margin-bottom:4px;color:#374151">Reason</label><textarea id="resignReason" class="input" rows="4" placeholder="Please provide a reason..."></textarea></div>
        <button type="submit" class="btn btn-danger" style="justify-content:center;padding:10px">Submit Resignation</button>
      </div>
    </form>
  </div>`);
}
async function submitResign(e){
  e.preventDefault();
  const data={notice_date:document.getElementById('resignDate').value,last_working_date:document.getElementById('resignLWD').value||null,reason:document.getElementById('resignReason').value};
  try{await api('/employees/me/resign','POST',data);showAlert('resignAlert','✅ Resignation submitted. HR will contact you.','success');document.getElementById('resignReason').value='';}
  catch(err){showAlert('resignAlert','❌ '+(err.detail||'Failed'));}
}
</script>
</body>
</html>
