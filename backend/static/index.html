<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cloudhubs HR Portal</title>
<script src="https://cdn.tailwindcss.com">
</script>
<style>
  .sidebar{background:#1e3a5f}
  .nav-active{background:#2563eb!important;color:#fff!important}
  .badge{padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600}
  .badge-pending{background:#fef3c7;color:#92400e}
  .badge-approved{background:#d1fae5;color:#065f46}
  .badge-rejected{background:#fee2e2;color:#991b1b}
  .badge-active{background:#dbeafe;color:#1e40af}
  .badge-terminated{background:#f3f4f6;color:#6b7280}
  .badge-resigned{background:#fef9c3;color:#854d0e}
  .card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #f1f5f9;padding:20px}
  .inp{width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;box-sizing:border-box}
  .inp:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
  .btn-p{background:#1e3a5f;color:#fff}.btn-p:hover{background:#152d4a}
  .btn-s{background:#059669;color:#fff}.btn-s:hover{background:#047857}
  .btn-d{background:#dc2626;color:#fff}.btn-d:hover{background:#b91c1c}
  .btn-n{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}.btn-n:hover{background:#e2e8f0}
  .tbl th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;background:#f8fafc;border-bottom:1px solid #e2e8f0}
  .tbl td{padding:12px 16px;font-size:13px;border-bottom:1px solid #f1f5f9;color:#374151}
  .tbl tr:hover td{background:#fafafa}
  .mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
  .mbox{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
  .ok{background:#d1fae5;border:1px solid #a7f3d0;color:#065f46;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
  .er{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
  .lbl{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px}
  select.inp option{color:#374151}
</style>
</head>
<body style="background:#f8fafc;font-family:system-ui,sans-serif;margin:0">

<!-- LOGIN PAGE -->
<div id="pg_login" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%)">
  <div style="background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.25)">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:32px">
      <div style="width:48px;height:48px;background:#1e3a5f;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
      </div>
      <div>
        <h1 style="font-size:20px;font-weight:700;color:#1e293b;margin:0">Cloudhubs HR Portal</h1>
        <p style="font-size:13px;color:#94a3b8;margin:2px 0 0">HR Management Portal</p>
      </div>
    </div>
    <div id="loginErr"></div>
    <div style="margin-bottom:16px">
      <label class="lbl">Email Address</label>
      <input id="lEmail" type="email" class="inp" placeholder="Enter your email" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div style="margin-bottom:24px">
      <label class="lbl">Password</label>
      <input id="lPass" type="password" class="inp" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button onclick="doLogin()" class="btn btn-p" style="width:100%;justify-content:center;padding:12px 16px;font-size:15px">Sign In</button>
    <p style="text-align:center;font-size:12px;color:#94a3b8;margin-top:20px;margin-bottom:0">Contact your HR administrator for login credentials</p>
  </div>
</div>

<!-- MAIN APP (hidden until login) -->
<div id="pg_app" style="display:none;height:100vh;overflow:hidden">
  <div style="display:flex;height:100%">
    <aside class="sidebar" style="width:220px;flex-shrink:0;display:flex;flex-direction:column;height:100%;overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.1)">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:34px;height:34px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16"/></svg>
          </div>
          <div>
            <div style="font-weight:700;color:#fff;font-size:13px">Cloudhubs HR Portal</div>
            <div id="roleLabel" style="font-size:11px;color:#93c5fd;text-transform:capitalize"></div>
          </div>
        </div>
      </div>
      <nav id="nav" style="flex:1;padding:10px;overflow-y:auto"></nav>
      <div style="padding:10px;border-top:1px solid rgba(255,255,255,.1)">
        <div id="userEmail" style="padding:6px 12px;margin-bottom:4px;font-size:11px;color:#7fb3e8;word-break:break-all"></div>
        <button onclick="logout()" style="display:flex;align-items:center;gap:8px;color:#93c5fd;font-size:13px;padding:8px 12px;border-radius:8px;cursor:pointer;background:none;border:none;width:100%;text-align:left" onmouseover="this.style.background='rgba(255,255,255,.08)'" onmouseout="this.style.background='none'">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Sign Out
        </button>
      </div>
    </aside>
    <main style="flex:1;overflow:auto;background:#f8fafc">
      <div style="padding:28px;max-width:1200px;margin:0 auto" id="content"><p style="color:#94a3b8">Loading...</p></div>
    </main>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="mbg" style="display:none"><div class="mbox" id="mbox"></div></div>

<script>
let tok='',role='',myEmpId='';
const $ = id=>document.getElementById(id);

function api(p,m,b){
  const o={method:m||'GET',headers:{'Content-Type':'application/json'}};
  if(tok)o.headers.Authorization='Bearer '+tok;
  if(b)o.body=JSON.stringify(b);
  return fetch(p,o).then(r=>{if(!r.ok)return r.json().then(e=>{throw e});return r.json()});
}

function alert2(id,msg,t='e'){
  const el=$(id); if(!el)return;
  el.innerHTML='<div class="'+(t==='s'?'ok':'er')+'">'+msg+'</div>';
  if(t==='s')setTimeout(()=>{el.innerHTML=''},3500);
}

function showModal(h){$('mbox').innerHTML=h;$('modal').style.display='flex';}
function closeModal(){$('modal').style.display='none';}
document.addEventListener('DOMContentLoaded',function(){ $('modal').addEventListener('click',function(e){if(e.target===$('modal'))closeModal();}); });

async function doLogin(){
  const email=$('lEmail').value, pass=$('lPass').value;
  if(!email||!pass){alert2('loginErr','Please enter email and password');return;}
  try{
    const d=await api('/auth/login','POST',{email,password:pass});
    tok=d.access_token; role=d.role;
    $('pg_login').style.display='none';
    $('pg_app').style.display='flex';
    $('roleLabel').textContent=role+' Portal';
    $('userEmail').textContent=email;
    buildNav(); 
    role==='employee'?showEmpDash():showAdminDash();
  }catch(e){alert2('loginErr',e.detail||'Invalid email or password');}
}

function logout(){
  tok='';role='';myEmpId='';
  $('pg_app').style.display='none';
  $('pg_login').style.display='flex';
  $('lEmail').value='';$('lPass').value='';
}

function navBtn(lbl,fn){
  return `<button onclick="${fn}()" id="nb_${fn}" style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:13px;color:#93c5fd;cursor:pointer;background:none;border:none;width:100%;text-align:left;margin-bottom:2px" onmouseover="if(!this.classList.contains('nav-active'))this.style.background='rgba(255,255,255,.08)'" onmouseout="if(!this.classList.contains('nav-active'))this.style.background='none'">${lbl}</button>`;
}
function setActive(fn){
  document.querySelectorAll('#nav button').forEach(b=>{b.classList.remove('nav-active');b.style.background='none';b.style.color='#93c5fd';});
  const el=$('nb_'+fn); if(el){el.classList.add('nav-active');el.style.background='#2563eb';el.style.color='#fff';}
}

function buildNav(){
  const a=role==='admin', m=role==='manager', e=role==='employee';
  const n=(a||m)?[
    ['🏠 Dashboard','showAdminDash'],
    ['👥 Employees','showEmployees'],
    ...(a?[['➕ Onboarding','showOnboard'],
    ['🗄️ Deleted Employees','showDeletedEmps'],['🔐 Create Admin','showCreateAdmin'],['📋 Resignations','showResignations']]:[] ),
    ['🕐 Timesheets','showTimesheets'],
    ['🌴 Leave Requests','showLeaveReq'],
    ['💰 Payroll','showPayroll'],
    ['📅 Holidays & Leaves','showHolidaysLeaves'],
    ['📄 Documents','showDocs'],
  ]:[
    ['🏠 My Dashboard','showEmpDash'],
    ['🕐 My Timesheets','showMyTimesheets'],
    ['🌴 Apply Leave','showApplyLeave'],
    ['📊 Leave Balance','showLeaveBalance'],
    ['💰 My Payslips','showPayslips'],
    ['📅 Holidays','showHolidaysLeaves'],
    ['📄 Documents','showDocs'],
    ['👤 My Profile','showProfile'],
    ['🎓 My Training','showTraining'],
    ['🚪 Resign','showResign'],
  ];
  $('nav').innerHTML=n.map(([l,f])=>navBtn(l,f)).join('');
}

function setPage(h){$('content').innerHTML=h;}
function h1(t){return `<h1 style="font-size:22px;font-weight:700;color:#1e293b;margin:0 0 20px">${t}</h1>`;}
function sc(lbl,val,col,ic){return `<div class="card" style="display:flex;align-items:center;gap:16px;padding:16px"><div style="width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;background:${col}20">${ic}</div><div><div style="font-size:26px;font-weight:700;color:#1e293b">${val}</div><div style="font-size:12px;color:#64748b;margin-top:2px">${lbl}</div></div></div>`;}
function fld(id,lbl,type='text',req=false){return `<div><label class="lbl">${lbl}${req?' *':''}</label><input id="${id}" type="${type}" class="inp"${req?' required':''}></div>`;}
function tblWrap(head,body){return `<div class="card" style="padding:0;overflow:hidden"><table class="tbl" style="width:100%"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;}
function th(t){return `<th>${t}</th>`;}
function noRows(cols,msg='No data'){return `<tr><td colspan="${cols}" style="text-align:center;color:#94a3b8;padding:40px">${msg}</td></tr>`;}

// ── ADMIN DASHBOARD ──
async function showAdminDash(){
  setActive('showAdminDash');
  setPage(h1(role==='manager'?'Manager Dashboard':'Admin Dashboard')+'<p style="color:#94a3b8">Loading...</p>');
  try{
    const [s,lv]=await Promise.all([api('/dashboard/stats'),api('/leaves/all').catch(()=>[])]);
    const pl=Array.isArray(lv)?lv.filter(l=>l.status==='pending').length:0;
    setPage(h1(role==='manager'?'Manager Dashboard':'Admin Dashboard')+
      `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px">
        ${sc('Total Employees',s.total_employees,'#2563eb','👥')}
        ${sc('Pending Timesheets',s.pending_timesheets,'#f59e0b','⏳')}
        ${sc('Approved Timesheets',s.approved_timesheets,'#10b981','✅')}
        ${sc('Pending Leaves',pl,'#8b5cf6','🌴')}</div>`+
      (s.upcoming_holidays?.length?`<div class="card"><h3 style="font-size:14px;font-weight:600;color:#374151;margin:0 0 12px">📅 Upcoming Holidays</h3>${s.upcoming_holidays.map(h=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:13px"><span style="font-weight:500">${h.name}</span><span style="color:#64748b">${h.date}</span></div>`).join('')}</div>`:'')+
      `<div style="margin-top:16px;padding:12px 16px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;font-size:13px;color:#1e40af">
        <strong>Quick actions:</strong> Use the sidebar to manage employees, timesheets, leaves, payroll, and more.
      </div>`
    );
  }catch(e){setPage(h1('Dashboard')+'<p style="color:#ef4444">Failed to load</p>');}
}

// ── EMPLOYEES ──
async function showEmployees(){
  setActive('showEmployees');
  setPage('<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px"><h1 style="font-size:22px;font-weight:700;color:#1e293b;margin:0">Employees</h1><button onclick="exportEmployeesCSV()" class="btn btn-n" style="font-size:13px">&#11015;&#65039; Export CSV</button></div>'+'<p style="color:#94a3b8">Loading...</p>');
  try{
    var emps = await api('/employees/');
    var rows = emps.map(function(e){
      return '<tr>' +
        '<td><div style="font-weight:500;color:#1e293b">'+e.first_name+' '+e.last_name+'</div><div style="font-size:12px;color:#94a3b8">'+e.email+'</div></td>' +
        '<td><button onclick="showEmpProfile('+e.id+')" style="font-family:monospace;font-size:12px;color:#2563eb;background:none;border:none;cursor:pointer;text-decoration:underline;padding:0" title="View full profile">'+e.employee_id+'</button></td>' +
        '<td>'+( e.designation||'-')+'</td>' +
        '<td>'+(e.department||'-')+'</td>' +
        '<td><span class="badge badge-'+(e.status||'active')+'">'+(e.status||'active')+'</span></td>' +
        '<td style="white-space:nowrap">' +
          '<button onclick="showEmpProfile('+e.id+')" class="btn btn-n" style="padding:3px 8px;font-size:11px;margin-right:3px;color:#7c3aed" title="View Profile">&#x1F194;</button>' +
          '<button onclick="doEditEmp('+e.id+')" class="btn btn-n" style="padding:3px 8px;font-size:11px;margin-right:3px;color:#2563eb">&#9999; Edit</button>' +
          '<button onclick="doResetPassword('+e.id+',\''+e.first_name+' '+e.last_name+'\')" class="btn btn-n" style="padding:3px 8px;font-size:11px;margin-right:3px;color:#d97706" title="Reset Password">&#x1F511;</button>' +
          '<button onclick="downloadEmploymentLetter('+e.id+',\''+e.employee_id+'\')" class="btn btn-n" style="padding:3px 8px;font-size:11px;margin-right:3px;color:#059669" title="Employment Letter">&#128196;</button>' +
          '<button onclick="doAssignMgrModal('+e.id+')" class="btn btn-n" style="padding:3px 8px;font-size:11px;margin-right:3px">Assign Mgr</button>' +
          '<button onclick="doTermModal('+e.id+',\''+e.first_name+' '+e.last_name+'\')" class="btn btn-d" style="padding:3px 8px;font-size:11px;margin-right:3px">Terminate</button>' +
          (role==='admin' ? '<button onclick="doDelEmp('+e.id+',\''+e.first_name+' '+e.last_name+'\')" class="btn btn-n" style="padding:3px 8px;font-size:11px;color:#dc2626">Delete</button>' : '') +
        '</td>' +
        '</tr>';
    }).join('');
    setPage(
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">' +
      '<h1 style="font-size:22px;font-weight:700;color:#1e293b;margin:0">Employees ('+emps.length+')</h1>' +
      '<button onclick="exportEmployeesCSV()" class="btn btn-n" style="font-size:13px">&#11015; Export CSV</button>' +
      '</div>' +
      tblWrap(
        ['Employee','ID','Designation','Department','Status','Actions'].map(th).join(''),
        emps.length ? rows : noRows(6,'No employees found')
      )
    );
  }catch(e){setPage(h1('Employees')+'<p style="color:#ef4444">Failed to load</p>');}
}


function doDelEmp(id,name){
  showModal(`<h3 style="font-size:16px;font-weight:600;margin:0 0 12px">Delete Employee</h3>
    <p style="font-size:13px;color:#475569;margin:0 0 20px">Delete <strong>${name}</strong>? This cannot be undone.</p>
    <div id="delAlert"></div>
    <div style="display:flex;gap:8px"><button onclick="confirmDelEmp(${id})" class="btn btn-d">Delete</button><button onclick="closeModal()" class="btn btn-n">Cancel</button></div>`);
}
async function confirmDelEmp(id){
  try{await api('/employees/'+id,'DELETE');closeModal();showEmployees();}
  catch(e){alert2('delAlert','Failed: '+(e.detail||'Error'));}
}

function doTermModal(id,name){
  const today=new Date().toISOString().split('T')[0];
  showModal(`<h3 style="font-size:16px;font-weight:600;margin:0 0 16px">Terminate: ${name}</h3>
    <div style="display:grid;gap:12px">
      <div><label class="lbl">Reason *</label><textarea id="tReason" class="inp" rows="3" placeholder="Enter termination reason..."></textarea></div>
      <div><label class="lbl">Date *</label><input id="tDate" type="date" class="inp" value="${today}"></div>
    </div>
    <div id="termAlert" style="margin-top:10px"></div>
    <div style="display:flex;gap:8px;margin-top:16px"><button onclick="confirmTerm(${id})" class="btn btn-d">Confirm Terminate</button><button onclick="closeModal()" class="btn btn-n">Cancel</button></div>`);
}
async function confirmTerm(id){
  const r=$('tReason').value, d=$('tDate').value;
  if(!r||!d){alert2('termAlert','Fill all fields');return;}
  try{const res=await api('/employees/'+id+'/terminate','POST',{reason:r,termination_date:d});closeModal();alert('✅ '+res.message);showEmployees();}
  catch(e){alert2('termAlert','Failed: '+(e.detail||'Error'));}
}

async function doAssignMgrModal(empId){
  const emps=await api('/employees/');
  showModal(`<h3 style="font-size:16px;font-weight:600;margin:0 0 16px">Assign Manager</h3>
    <select id="mgrSel" class="inp" style="margin-bottom:16px">
      <option value="">Select manager...</option>
      ${emps.filter(e=>e.id!==empId).map(e=>'<option value="'+e.id+'">'+e.first_name+' '+e.last_name+' ('+e.employee_id+')</option>').join('')}
    </select>
    <div id="mgrAlert"></div>
    <div style="display:flex;gap:8px"><button onclick="confirmAssignMgr(${empId})" class="btn btn-p">Assign</button><button onclick="closeModal()" class="btn btn-n">Cancel</button></div>`);
}
async function confirmAssignMgr(empId){
  const mid=$('mgrSel').value; if(!mid){alert2('mgrAlert','Select a manager');return;}
  try{const r=await api('/employees/'+empId+'/assign-manager','POST',{manager_employee_id:parseInt(mid)});closeModal();alert('✅ '+r.message);}
  catch(e){alert2('mgrAlert','Failed: '+(e.detail||'Error'));}
}

// ── ONBOARDING ──
function showOnboard(){
  setActive('showOnboard');
  setPage(h1('Employee Onboarding')+`<div class="card" style="max-width:720px">
    <div id="onbAlert"></div>
    <form onsubmit="submitOnboard(event)" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      ${fld('f_fn','First Name','text',true)}${fld('f_ln','Last Name','text',true)}
      ${fld('f_em','Email','email',true)}<div><label class="lbl">Password *</label><div style="position:relative"><input id="f_pw" type="password" class="inp" required style="padding-right:40px"><button type="button" onclick="togglePwd('f_pw','onb_eye')" id="onb_eye" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px">👁</button></div></div>
      ${fld('f_ph','Phone')}${fld('f_des','Designation')}
      ${fld('f_dep','Department')}
      <div><label class="lbl">Employment Type</label><select id="f_et" class="inp"><option value="permanent">Permanent (CH-EMP)</option><option value="contractor">Contractor (CH-CON)</option><option value="intern">Intern (CH-INT)</option></select></div>
      ${fld('f_doj','Date of Joining','date')}${fld('f_dob','Date of Birth','date')}
      <div style="grid-column:span 2">${fld('f_addr','Address')}</div>
      ${fld('f_ba','Bank Account')}${fld('f_bn','Bank Name')}
      ${fld('f_ic','IFSC Code')}${fld('f_pf','PF Number')}${fld('f_uan','UAN Number')}
      <div style="grid-column:span 2"><button type="submit" class="btn btn-p">Create Employee</button></div>
    </form>
  </div>`);
}
async function submitOnboard(e){
  e.preventDefault();
  const d={first_name:$('f_fn').value,last_name:$('f_ln').value,email:$('f_em').value,password:$('f_pw').value};
  ['f_ph','f_des','f_dep','f_doj','f_dob','f_addr','f_ba','f_bn','f_ic','f_pf','f_uan'].forEach((id,i)=>{const v=$(id)?.value;if(v)d[['phone','designation','department','date_of_joining','date_of_birth','address','bank_account','bank_name','ifsc_code','pf_number','uan_number'][i]]=v;});
  d.employment_type=$('f_et').value;
  try{const r=await api('/employees/','POST',d);alert2('onbAlert','✅ Created! ID: '+r.employee_id,'s');e.target.reset();}
  catch(err){alert2('onbAlert','❌ '+(err.detail||'Failed'));}
}

// ── CREATE ADMIN ──
function showCreateAdmin(){

async function loadSalaryComp(empId){
  if(!empId) return;
  try{
    const c = await api('/payroll/components/'+empId);
    $('sc_basic').value = c.basic || '';
    $('sc_hra').value = c.hra || '';
    $('sc_allow').value = c.allowances || '';
    $('sc_bonus').value = c.bonus || '';
    $('sc_pf').value = c.pf_deduction || '';
    $('sc_pt').value = c.professional_tax || '';
    $('sc_it').value = c.income_tax || '';
    $('sc_date').value = c.effective_from || '';
    alert2('scAlert','✅ Loaded existing salary configuration','s');
  }catch(e){
    // 404 = not configured yet, clear fields
    $('sc_basic').value=''; $('sc_hra').value=''; $('sc_allow').value='';
    $('sc_bonus').value=''; $('sc_pf').value=''; $('sc_pt').value='';
    $('sc_it').value=''; $('sc_date').value='';
    if(e.detail && e.detail.includes('404')) alert2('scAlert','No salary configured yet for this employee — fill in the fields and save','s');
  }
}

async function saveSalaryComp(){
  const emp=$('scEmp').value;
  if(!emp){alert2('scAlert','Select an employee first');return;}
  const data={
    employee_id:parseInt(emp),
    basic:parseFloat($('sc_basic').value)||0,
    hra:parseFloat($('sc_hra').value)||0,
    allowances:parseFloat($('sc_allow').value)||0,
    bonus:parseFloat($('sc_bonus').value)||0,
    pf_deduction:parseFloat($('sc_pf').value)||0,
    professional_tax:parseFloat($('sc_pt').value)||0,
    income_tax:parseFloat($('sc_it').value)||0,
  };
  const d=$('sc_date').value; if(d) data.effective_from=d;
  try{
    await api('/payroll/components','POST',data);
    alert2('scAlert','✅ Salary configuration saved successfully!','s');
  }catch(err){alert2('scAlert','❌ '+(err.detail||'Failed to save'));}
}

async function genPayslip(){
  const emp=$('pEmp').value;
  if(!emp){alert2('payAlert','Select employee');return;}
  try{await api('/payroll/generate','POST',{employee_id:parseInt(emp),month:parseInt($('pMo').value),year:parseInt($('pYr').value)});alert2('payAlert','✅ Payslip generated!','s');setTimeout(showPayroll,1200);}
  catch(err){alert2('payAlert','❌ '+(err.detail||'Configure salary components first'));}
}

}

async function confirmResetPassword(id) {
  var p = document.getElementById('rp_pass').value;
  var c = document.getElementById('rp_conf').value;
  if (!p || p.length < 6) { alert2('rpAlert', 'Password must be at least 6 characters'); return; }
  if (p !== c) { alert2('rpAlert', 'Passwords do not match'); return; }
  try {
    var r = await api('/employees/' + id + '/reset-password', 'POST', { new_password: p });
    alert2('rpAlert', r.message || 'Password reset!', 's');
    setTimeout(closeModal, 1500);
  } catch (err) { alert2('rpAlert', 'Failed: ' + (err.detail || 'Error')); }
}

// FEATURE 3: EXPORT EMPLOYEES CSV
// ══════════════════════════════════════════════════════
async function exportEmployeesCSV() {
  try {
    var emps = await api('/employees/');
    var headers = ['Employee ID','First Name','Last Name','Email','Phone','Designation',
      'Department','Employment Type','Status','Date of Joining','Date of Birth',
      'Address','Bank Account','Bank Name','IFSC Code','PF Number','UAN Number'];
    var rows = emps.map(function(e) {
      return [
        e.employee_id, e.first_name, e.last_name, e.email, e.phone || '',
        e.designation || '', e.department || '', e.employment_type, e.status || 'active',
        e.date_of_joining || '', e.date_of_birth || '', (e.address || '').replace(/,/g,' '),
        e.bank_account || '', e.bank_name || '', e.ifsc_code || '',
        e.pf_number || '', e.uan_number || ''
      ].map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(',');
    });
    var csv = [headers.map(function(h){return '"'+h+'"';}).join(',')].concat(rows).join('\n');
    var blob = new Blob([csv], { type: 'text/csv' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'CloudHub_Employees_' + new Date().toISOString().split('T')[0] + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (err) { alert('Export failed: ' + (err.detail || 'Error')); }
}

// ══════════════════════════════════════════════════════
// FEATURE 4: EYE TOGGLE (show/hide password)
// ══════════════════════════════════════════════════════
function togglePwd(inputId, btnId) {
  var inp = document.getElementById(inputId);
  var btn = document.getElementById(btnId);
  if (!inp) return;
  if (inp.type === 'password') { inp.type = 'text'; if (btn) btn.textContent = '🙈'; }
  else { inp.type = 'password'; if (btn) btn.textContent = '👁'; }
}

async function saveEditEmp(id) {

    '<p style="font-size:13px;color:#475569;margin:0 0 20px">Reinstate <strong>' + name + '</strong>? This restores their login and marks them active.</p>' +
    '<div id="reinstateAlert"></div>' +
    '<div style="display:flex;gap:8px">' +
      '<button onclick="confirmReinstate(' + id + ')" class="btn btn-s">Confirm Reinstate</button>' +
      '<button onclick="closeModal()" class="btn btn-n">Cancel</button>' +
    '</div>'
  );
}

async function confirmReinstate(id) {
  try {
    var r = await api('/employees/' + id + '/reinstate', 'POST');
    alert2('reinstateAlert', r.message || 'Reinstated!', 's');
    setTimeout(function() { closeModal(); showDeletedEmps(); }, 1200);
  } catch (err) { alert2('reinstateAlert', 'Failed: ' + (err.detail || 'Error')); }
}


// ══════════════════════════════════════════════════════
// PAYSLIP PDF DOWNLOAD (fetch+blob with auth)
// ══════════════════════════════════════════════════════
async function downloadPayslip(recordId, label) {
  try {
    var resp = await fetch('/payroll/slip/' + recordId, {
      headers: { 'Authorization': 'Bearer ' + tok }
    });
    if (!resp.ok) {
      var err = await resp.json().catch(function(){ return {}; });
      alert('Failed to download payslip: ' + (err.detail || resp.status));
      return;
    }
    var blob = await resp.blob();
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'Payslip_' + label + '.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
  } catch(err) { alert('Download error: ' + (err.message || 'Unknown error')); }
}

  alert2('payAlert', '⏳ Generating payslips from date of joining...', 's');
  try {
    var r = await api('/payroll/generate-all/' + empId, 'POST');
    alert2('payAlert', '✅ ' + r.message, 's');
    setTimeout(showPayroll, 1500);
  } catch(err) {
    alert2('payAlert', '❌ ' + (err.detail || 'Failed. Set salary components first.'));
  }
}

function getTrainingStatus() {
  var stored = localStorage.getItem('training_status_' + (window._empEmail || 'default'));
  return stored ? JSON.parse(stored) : {};
}

function saveTrainingStatus(status) {
  localStorage.setItem('training_status_' + (window._empEmail || 'default'), JSON.stringify(status));
}

function markTraining(id, completed) {
  var status = getTrainingStatus();
  if (completed) {
    status[id] = { completed: true, date: new Date().toLocaleDateString('en-IN') };
  } else {
    delete status[id];
  }
  saveTrainingStatus(status);
  showTraining();
}

async function showTraining() {
  setActive('showTraining');
  var status = getTrainingStatus();
  var total = TRAININGS.length;
  var done = Object.keys(status).filter(function(k){ return status[k].completed; }).length;
  var pct = Math.round(done / total * 100);

  var catColors = {
    'Compliance': '#dc2626', 'Security': '#2563eb', 'Safety': '#f59e0b',
    'Culture': '#8b5cf6', 'HR': '#059669', 'IT': '#0891b2',
    'Soft Skills': '#d97706', 'Professional': '#7c3aed'
  };

  var rows = TRAININGS.map(function(t) {
    var s = status[t.id];
    var isDone = s && s.completed;
    var cat = t.category;
    var col = catColors[cat] || '#64748b';
    return '<div class="card" style="margin-bottom:12px;border-left:4px solid ' + (isDone ? '#059669' : (t.mandatory ? '#dc2626' : '#94a3b8')) + '">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">' +
        '<div style="flex:1">' +
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
            '<span style="font-weight:600;font-size:14px;color:#1e293b">' + t.title + '</span>' +
            (t.mandatory ? '<span style="background:#fee2e2;color:#dc2626;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px">MANDATORY</span>' : '<span style="background:#f1f5f9;color:#64748b;font-size:10px;padding:2px 8px;border-radius:999px">OPTIONAL</span>') +
          '</div>' +
          '<div style="font-size:12px;color:#64748b;margin-bottom:6px">' + t.desc + '</div>' +
          '<div style="display:flex;gap:12px;font-size:11px">' +
            '<span style="background:' + col + '20;color:' + col + ';padding:2px 8px;border-radius:999px;font-weight:600">' + cat + '</span>' +
            '<span style="color:#94a3b8">⏱ ' + t.duration + '</span>' +
            (isDone ? '<span style="color:#059669;font-weight:600">✅ Completed on ' + s.date + '</span>' : '<span style="color:#f59e0b">⏳ Pending</span>') +
          '</div>' +
        '</div>' +
        '<div style="flex-shrink:0">' +
          (isDone
            ? '<button onclick="markTraining(' + t.id + ',false)" class="btn btn-n" style="font-size:12px;padding:4px 12px">↩ Undo</button>'
            : '<button onclick="markTraining(' + t.id + ',true)" class="btn btn-s" style="font-size:12px;padding:4px 12px">✓ Mark Done</button>'
          ) +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  var progressBar = '<div style="background:#f1f5f9;border-radius:999px;height:12px;margin:12px 0">' +
    '<div style="background:' + (pct === 100 ? '#059669' : '#2563eb') + ';height:12px;border-radius:999px;width:' + pct + '%;transition:width .3s"></div></div>';

  setPage(
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">' +
      '<h1 style="font-size:22px;font-weight:700;color:#1e293b;margin:0">🎓 My Training</h1>' +
      '<div style="text-align:right">' +
        '<div style="font-size:13px;color:#64748b">' + done + ' of ' + total + ' completed</div>' +
        '<div style="font-size:11px;color:#94a3b8">(' + pct + '%)</div>' +
      '</div>' +
    '</div>' +
    '<div class="card" style="margin-bottom:20px">' +
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<span style="font-size:13px;font-weight:600;color:#1e293b">Overall Progress</span>' +
        '<span style="font-size:13px;font-weight:700;color:' + (pct===100?'#059669':'#2563eb') + '">' + pct + '%</span>' +
      '</div>' +
      progressBar +
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:12px">' +
        '<div style="text-align:center;padding:10px;background:#d1fae5;border-radius:8px"><div style="font-size:22px;font-weight:700;color:#059669">' + done + '</div><div style="font-size:11px;color:#065f46">Completed</div></div>' +
        '<div style="text-align:center;padding:10px;background:#fee2e2;border-radius:8px"><div style="font-size:22px;font-weight:700;color:#dc2626">' + (total-done) + '</div><div style="font-size:11px;color:#991b1b">Pending</div></div>' +
        '<div style="text-align:center;padding:10px;background:#fef3c7;border-radius:8px"><div style="font-size:22px;font-weight:700;color:#92400e">' + TRAININGS.filter(function(t){return t.mandatory && !(status[t.id]&&status[t.id].completed);}).length + '</div><div style="font-size:11px;color:#92400e">Mandatory Pending</div></div>' +
      '</div>' +
    '</div>' +
    rows
  );
}
